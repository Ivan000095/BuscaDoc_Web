models:
  User:
    name: string
    email: string unique
    password: string
    role: enum:admin,doctor,paciente,farmacia
    foto: string nullable
    f_nacimiento: date nullable
    genero: string nullable
    latitud: decimal:10,8 nullable
    longitud: decimal:11,8 nullable
    estado: boolean default:true
    relationships:
      hasOne: Doctor, Paciente, Farmacia
      hasMany: Mensaje, Comentario, Cita

  Especialidad:
    nombre: string

  Doctor:
    user_id: id foreign:users.id
    cedula: string nullable
    idiomas: string nullable
    descripcion: text nullable
    costo: decimal:8,2
    horario_entrada: time nullable
    horario_salida: time nullable
    relationships:
      belongsTo: User

  Paciente:
    user_id: id foreign:users.id
    tipo_sangre: string nullable
    alergias: text nullable
    relationships:
      belongsTo: User
      hasMany: Cita

  Farmacia:
    user_id: id foreign:users.id
    nom_farmacia: string
    rfc: string nullable
    telefono: string nullable
    descripcion: text nullable
    horario: string nullable
    dias_op: string nullable
    relationships:
      belongsTo: User

  Comentario:
    id_autor: id foreign:users.id
    id_destinatario: id foreign:users.id
    tipo: enum:resena,pregunta
    calificacion: integer nullable
    contenido: text nullable
    relationships:
      belongsTo: User
      hasMany: Respuesta

  Respuesta:
    comentario_id: id foreign:comentarios.id
    id_respondedor: id foreign:users.id
    contenido: text
    relationships:
      belongsTo: Comentario, User

  Mensaje:
    id_remitente: id foreign:users.id
    id_destinatario: id foreign:users.id
    contenido: text
    leido: boolean default:false
    relationships:
      belongsTo: User

  Cita:
    doctor_id: id foreign:doctors.id
    paciente_id: id foreign:pacientes.id
    fecha_hora: datetime
    detalles: text nullable
    estado: enum:pendiente,confirmada,cancelada,completada
    relationships:
      belongsTo: User

  Reporte:
    id_usr_reporte: id foreign:users.id
    id_usr_reportado: id foreign:users.id
    razon: text
    relationships:
      belongsTo: User

  Doctor_Especialidad:
    doctor_id: id foreign:doctors.id
    especialidad_id: id foreign:especialidads.id

controllers:
  Doctor:
    resource: index, create, store, edit, update, destroy
    index:
      query: all
      render: doctores.index with:doctors
    store:
      validate: user_id, cedula, costo
      save: doctor
      redirect: doctores.index
    update:
      validate: cedula, costo
      update: doctor
      redirect: doctores.index

  Comentario:
    resource: store, destroy
    store:
      validate: id_destinatario, tipo, contenido
      save: comentario
      redirect: back
    destroy:
      delete: comentario
      redirect: back

  Respuesta:
    resource: store
    store:
      validate: comentario_id, contenido
      save: respuesta
      redirect: back

  Mensaje:
    resource: index, store
    index:
      query: all
      render: mensajes.index with:mensajes
    store:
      validate: id_destinatario, contenido
      save: mensaje
      redirect: mensajes.index

  API\DoctorController:
    resource: api
    index:
      query: all
      resource: Doctor      #
    show:
      find: id
      resource: Doctor
    store:
      validate: user_id, cedula, costo
      save: doctor
      resource: Doctor
    update:
      validate: costo, descripcion
      update: doctor
      resource: Doctor

  API\ComentarioController:
    resource: api
    index:
      query: all
      resource: Comentario  # Cambiado: De ComentarioResource a Comentario
    store:
      validate: id_destinatario, tipo, calificacion, contenido
      save: comentario
      resource: Comentario

  API\RespuestaController:
    resource: api
    store:
      validate: comentario_id, contenido
      save: respuesta
      resource: Respuesta

  API\MensajeController:
    resource: api
    index:
      query: all
      resource: Mensaje
    store:
      validate: id_destinatario, contenido
      save: mensaje
      resource: Mensaje
    update:
      validate: leido
      update: mensaje
      resource: Mensaje

seeders: User, Doctor, Farmacia, Especialidad
